stages:
  prepare:
    cmd: ./venv/bin/python3 src/prepare.py data/raw/train.csv data/prepared
    deps:
      - data/raw/train.csv
      - src/prepare.py
    outs:
      - data/prepared
  train:
    cmd: ./venv/bin/python3 src/train.py data/prepared models --max_depth 10
    deps:
      - data/prepared
      - src/train.py
    outs:
      - models
